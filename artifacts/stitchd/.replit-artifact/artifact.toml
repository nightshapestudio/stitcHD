kind = "web"
previewPath = "/"
title = "NIGHTSHAPE TETHR"
version = "1.0.0"
id = "artifacts/tethr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25107

[services.development]
run = "pnpm --filter @workspace/tethr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tethr", "run", "build" ]
publicDir = "artifacts/tethr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25107"
BASE_PATH = "/"
